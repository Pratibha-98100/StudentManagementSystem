<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            color: #1f2937;
        }

        /* Navbar */
        .navbar {
            background-color: #111827;
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar-brand {
            color: #ffffff;
            font-size: 20px;
            font-weight: bold;
            text-decoration: none;
        }

        .nav-link {
            color: #d1d5db;
            text-decoration: none;
            font-size: 15px;
            transition: 0.3s ease;
        }

        .nav-link:hover {
            color: #ffffff;
        }

        /* Page Layout */
        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        h1 {
            font-size: 32px;
            color: #1f2937;
        }

        /* Add Button */
        .add-btn {
            background-color: #2563eb;
            color: #ffffff;
            padding: 12px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            transition: 0.3s ease;
        }

        .add-btn:hover {
            background-color: #1d4ed8;
        }

        /* Table */
        .table-container {
            width: 100%;
            overflow-x: auto;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 700px;
        }

        thead {
            background-color: #2563eb;
            color: #ffffff;
        }

        th, td {
            padding: 16px 20px;
            text-align: left;
            border-bottom: 1px solid #e5e7eb;
        }

        th {
            font-size: 15px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            font-size: 15px;
            color: #374151;
        }

        tbody tr:hover {
            background-color: #f1f5ff;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        /* Action Buttons */
        .action-links {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 14px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: 0.3s ease;
        }

        .update-btn {
            background-color: #10b981;
            color: #ffffff;
        }

        .update-btn:hover {
            background-color: #059669;
        }

        .delete-btn {
            background-color: #ef4444;
            color: #ffffff;
        }

        .delete-btn:hover {
            background-color: #dc2626;
        }

        .no-data {
            text-align: center;
            padding: 24px;
            color: #6b7280;
            font-style: italic;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 10px;
                padding: 16px 20px;
            }

            .page-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }

            h1 {
                font-size: 26px;
            }

            .add-btn {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>

<body>

<nav class="navbar">
    <a class="navbar-brand" href="#">Student Management System</a>

    <a class="nav-link" th:href="@{/students}">
        Student Management
    </a>
</nav>

<div class="container">

    <div class="page-header">
        <h1>Student List</h1>

        <a class="add-btn" th:href="@{/students/new}">
            Add Student
        </a>
    </div>

    <div class="table-container">
        <table>
            <thead>
            <tr>
                <th>First Name</th>
                <th>Last Name</th>
                <th>Email</th>
                <th>Action</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="student : ${students}">
                <td th:text="${student.firstName}"></td>
                <td th:text="${student.lastName}"></td>
                <td th:text="${student.email}"></td>
                <td>
                    <div class="action-links">
                        <a class="btn update-btn"
                           th:href="@{/students/edit/{id}(id=${student.id})}">
                            Update
                        </a>

                        <a class="btn delete-btn"
                           th:href="@{/students/{id}(id=${student.id})}"
                           onclick="return confirm('Are you sure you want to delete this student?');">
                            Delete
                        </a>
                    </div>
                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(students)}">
                <td colspan="4" class="no-data">No students found</td>
            </tr>
            </tbody>
        </table>
    </div>

</div>

</body>
</html>
